<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錢錢記</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #9ECCE8 0%, #B4D4E8 100%);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        .nav {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav button {
            flex: 1;
            padding: 16px 6px;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            color: #555;
        }
        .nav button.active {
            background: white;
            color: #1e88e5;
            border-bottom: 3px solid #1e88e5;
            font-weight: 600;
        }
        .tab { display: none; padding: 20px; }
        .tab.active { display: block; }
        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        button {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            border-radius: 12px;
            border: none;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-meal { background: #66bb6a; color: white; }
        .btn-car { background: #42a5f5; color: white; }
        .amount {
            font-size: 42px;
            font-weight: bold;
            text-align: center;
        }
        .positive { color: #2e7d32; }
        .negative { color: #c62828; }
        .review-box {
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 16px;
            margin: 15px 0;
            box-shadow: 0 3px 12px rgba(0,0,0,0.1);
        }
        .daily-item {
            padding: 14px 0;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="nav">
            <button onclick="switchTab(0)" class="active">今日入數</button>
            <button onclick="switchTab(1)">今月入數</button>
            <button onclick="switchTab(2)">每日review</button>
            <button onclick="switchTab(3)">今月review</button>
            <button onclick="switchTab(4)">設定</button>
        </div>

        <!-- 今日入數 -->
        <div id="tab0" class="tab active">
            <div class="card">
                <h2>今日 / 補數</h2>
                <label>日期：</label>
                <input type="date" id="record-date" style="margin-bottom:15px;">
                
                <button class="btn-meal" onclick="addMeal()">🍚 飯錢</button>
                <button class="btn-car" onclick="addCar()">🚕 車費</button>
            </div>
        </div>

        <!-- 今月入數 -->
        <div id="tab1" class="tab">
            <div class="card">
                <h2>月度開支記錄</h2>
                <select id="category-select"></select>
                <input type="number" id="monthly-amount" placeholder="金額" style="font-size:18px; margin:10px 0;">
                <button onclick="addMonthlyExpense()">記錄月度開支</button>
                <p id="monthly-log" style="margin-top:15px; font-size:14px; color:#555;"></p>
            </div>
        </div>

        <!-- 每日review -->
        <div id="tab2" class="tab">
            <div class="review-box">
                <h2>今日慳到</h2>
                <div id="today-savings" class="amount positive">$0</div>
            </div>
            <div class="card">
                <h3>今日明細</h3>
                <div id="today-detail"></div>
            </div>
        </div>

        <!-- 今月review -->
        <div id="tab3" class="tab">
            <div class="review-box">
                <h2>今日慳到</h2>
                <div id="today-savings-month" class="amount positive">$0</div>
            </div>
            
            <div class="review-box">
                <h2>今個月累計慳到</h2>
                <div id="month-total-savings" class="amount positive">$0</div>
            </div>

            <div class="card">
                <h3>月度項目剩餘</h3>
                <div id="monthly-review-list"></div>
            </div>
        </div>

        <!-- 設定 -->
        <div id="tab4" class="tab">
            <div class="card">
                <h2>設定</h2>
                <label>每日車費預算</label>
                <input type="number" id="daily-car" value="70">
                
                <label>每日飯錢預算</label>
                <input type="number" id="daily-meal-budget" value="250">
                
                <button onclick="saveSettings()">儲存設定</button>
                <button onclick="resetAll()" style="background:#c62828;">重置所有數據</button>
            </div>
        </div>
    </div>

    <script>
        let settings = { dailyCar: 70, dailyMealBudget: 250 };
        let monthlyBudgets = { chii:700, pretty:350, larp_cot:1600, more_food:1500, idol:2000, uber:600, utilities:500, sfaa:1680 };
        let monthlySpent = {};
        let dailyRecords = {};   // { "2025-06-05": { cars: [50,20], meals: [180,100] } }

        function init() {
            loadData();
            renderCategorySelect();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('record-date').value = today;
            switchTab(0);
            updateReviews();
        }

        function loadData() {
            if (localStorage.getItem('moneySettings')) settings = JSON.parse(localStorage.getItem('moneySettings'));
            if (localStorage.getItem('monthlyBudgets')) monthlyBudgets = JSON.parse(localStorage.getItem('monthlyBudgets'));
            if (localStorage.getItem('monthlySpent')) monthlySpent = JSON.parse(localStorage.getItem('monthlySpent'));
            if (localStorage.getItem('dailyRecords')) dailyRecords = JSON.parse(localStorage.getItem('dailyRecords'));
        }

        function saveData() {
            localStorage.setItem('moneySettings', JSON.stringify(settings));
            localStorage.setItem('monthlyBudgets', JSON.stringify(monthlyBudgets));
            localStorage.setItem('monthlySpent', JSON.stringify(monthlySpent));
            localStorage.setItem('dailyRecords', JSON.stringify(dailyRecords));
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            document.querySelectorAll('.nav button')[n].classList.add('active');
            if (n === 2 || n === 3) updateReviews();
        }

        function addMeal() {
            const date = document.getElementById('record-date').value;
            const amount = parseFloat(prompt("輸入飯錢金額："));
            if (!amount || amount <= 0) return;
            
            if (!dailyRecords[date]) dailyRecords[date] = { cars: [], meals: [] };
            dailyRecords[date].meals.push(amount);
            saveData();
            updateReviews();
            alert('✅ 飯錢已記錄');
        }

        function addCar() {
            const date = document.getElementById('record-date').value;
            const amount = parseFloat(prompt("輸入車費金額："));
            if (!amount || amount <= 0) return;
            
            if (!dailyRecords[date]) dailyRecords[date] = { cars: [], meals: [] };
            dailyRecords[date].cars.push(amount);
            saveData();
            updateReviews();
            alert('✅ 車費已記錄');
        }

        function renderCategorySelect() {
            const select = document.getElementById('category-select');
            select.innerHTML = '';
            const names = { chii:"Chii", pretty:"Pretty", larp_cot:"Larp/Cot", more_food:"額外食物", idol:"Idol", uber:"Uber", utilities:"水電", sfaa:"SFAA" };
            Object.keys(monthlyBudgets).forEach(k => {
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = names[k] || k;
                select.appendChild(opt);
            });
        }

        function addMonthlyExpense() {
            const cat = document.getElementById('category-select').value;
            const amt = parseFloat(document.getElementById('monthly-amount').value);
            if (!amt || amt <= 0) return alert('請輸入有效金額');
            
            if (!monthlySpent[cat]) monthlySpent[cat] = 0;
            monthlySpent[cat] += amt;
            
            saveData();
            updateReviews();
            document.getElementById('monthly-amount').value = '';
            alert('✅ 月度開支已記錄');
        }

        function updateReviews() {
            const todayStr = new Date().toISOString().split('T')[0];
            const todayR = dailyRecords[todayStr] || {cars:[], meals:[]};
            const todayCar = todayR.cars.reduce((a,b)=>a+b,0);
            const todayMeal = todayR.meals.reduce((a,b)=>a+b,0);
            const dailyBudget = settings.dailyCar + settings.dailyMealBudget;
            const todayUsed = todayCar + todayMeal;
            const todaySave = dailyBudget - todayUsed;

            // 每日review
            document.getElementById('today-savings').textContent = `$${Math.round(todaySave)}`;
            document.getElementById('today-savings').className = `amount ${todaySave >= 0 ? 'positive' : 'negative'}`;

            let detailHTML = `<strong>車費總計：$${todayCar}</strong><br>`;
            if (todayR.cars && todayR.cars.length) detailHTML += `(${todayR.cars.join(' + ')})<br>`;
            detailHTML += `<strong>飯錢總計：$${todayMeal}</strong>`;
            if (todayR.meals && todayR.meals.length) detailHTML += `<br>(${todayR.meals.join(' + ')})`;
            document.getElementById('today-detail').innerHTML = detailHTML;

            // 今月review
            document.getElementById('today-savings-month').textContent = `$${Math.round(todaySave)}`;
            document.getElementById('today-savings-month').className = `amount ${todaySave >= 0 ? 'positive' : 'negative'}`;

            let totalSave = 0;
            Object.keys(dailyRecords).forEach(date => {
                const r = dailyRecords[date];
                const car = (r.cars || []).reduce((a,b)=>a+b,0);
                const meal = (r.meals || []).reduce((a,b)=>a+b,0);
                const used = car + meal;
                totalSave += (dailyBudget - used);
            });

            document.getElementById('month-total-savings').textContent = `$${Math.round(totalSave)}`;
            document.getElementById('month-total-savings').className = `amount ${totalSave >= 0 ? 'positive' : 'negative'}`;

            // 月度項目
            let mhtml = '';
            Object.keys(monthlyBudgets).forEach(k => {
                const name = k === 'utilities' ? '水電' : (k === 'chii' ? 'Chii' : k);
                const remain = monthlyBudgets[k] - (monthlySpent[k]||0);
                mhtml += `<div class="daily-item"><strong>${name}</strong>　剩餘 <span class="${remain>=0?'positive':'negative'}">$${remain}</span></div>`;
            });
            document.getElementById('monthly-review-list').innerHTML = mhtml || '<p>未有月度開支</p>';
        }

        function saveSettings() {
            settings.dailyCar = parseFloat(document.getElementById('daily-car').value) || 70;
            settings.dailyMealBudget = parseFloat(document.getElementById('daily-meal-budget').value) || 250;
            saveData();
            updateReviews();
            alert('✅ 設定已儲存');
        }

        function resetAll() {
            if (confirm('確定清除所有數據？')) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
