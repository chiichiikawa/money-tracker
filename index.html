<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錢錢記 - 每日開支追蹤</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header {
            background: #4f46e5;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .nav {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
        }
        .nav button {
            flex: 1;
            padding: 15px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }
        .nav button.active {
            background: white;
            border-bottom: 3px solid #4f46e5;
            font-weight: bold;
        }
        .tab {
            display: none;
            padding: 20px;
        }
        .tab.active {
            display: block;
        }
        .card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        input, select, button {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-size: 16px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #4338ca;
        }
        .daily-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        .stat {
            text-align: center;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .amount {
            font-size: 28px;
            font-weight: bold;
        }
        .positive { color: #10b981; }
        .negative { color: #ef4444; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background: #f1f5f9;
        }
        .history {
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 錢錢記</h1>
            <p>每日開支 + 月度分配管理</p>
        </header>

        <div class="nav">
            <button onclick="switchTab(0)" class="active">今日</button>
            <button onclick="switchTab(1)">本月</button>
            <button onclick="switchTab(2)">歷史</button>
            <button onclick="switchTab(3)">設定</button>
        </div>

        <!-- 今日 Tab -->
        <div id="tab0" class="tab active">
            <div class="card">
                <h2>今日概覽</h2>
                <div class="daily-summary">
                    <div class="stat">
                        <div>車費 (固定)</div>
                        <div class="amount">$70</div>
                    </div>
                    <div class="stat">
                        <div>飯錢</div>
                        <div class="amount" id="today-meal">-$250</div>
                    </div>
                    <div class="stat">
                        <div>今日已用</div>
                        <div class="amount" id="today-total">$320</div>
                    </div>
                    <div class="stat">
                        <div>今日剩餘</div>
                        <div class="amount positive" id="today-remain">$0</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>今日記錄</h2>
                <label>飯錢 (預設 $250)：</label><br>
                <input type="number" id="meal-input" value="250" style="width:100%; margin:8px 0;">
                
                <label>其他今日開支：</label><br>
                <input type="number" id="extra-input" placeholder="例如：飲品 $45" style="width:100%; margin:8px 0;">
                
                <button onclick="saveToday()" style="width:100%; margin-top:10px;">儲存今日記錄</button>
            </div>

            <div class="card">
                <h3>可轉入月度分配： <span id="daily-savings" class="positive">$0</span></h3>
            </div>
        </div>

        <!-- 本月 Tab -->
        <div id="tab1" class="tab">
            <div class="card">
                <h2>本月總覽</h2>
                <div class="daily-summary">
                    <div class="stat">
                        <div>月度預算</div>
                        <div class="amount" id="month-budget">$10,000</div>
                    </div>
                    <div class="stat">
                        <div>已用</div>
                        <div class="amount" id="month-spent">$0</div>
                    </div>
                    <div class="stat">
                        <div>剩餘</div>
                        <div class="amount positive" id="month-remain">$10,000</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>月度分配</h2>
                <table id="monthly-table">
                    <thead>
                        <tr>
                            <th>項目</th>
                            <th>預算</th>
                            <th>已用</th>
                            <th>剩餘</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="card">
                <h2>新增月度開支</h2>
                <select id="category-select" style="width:100%; margin-bottom:8px;">
                    <!-- JS 動態填充 -->
                </select>
                <input type="number" id="monthly-amount" placeholder="金額" style="width:100%; margin-bottom:8px;">
                <button onclick="addMonthlyExpense()" style="width:100%;">記錄</button>
            </div>
        </div>

        <!-- 歷史 Tab -->
        <div id="tab2" class="tab">
            <div class="card">
                <h2>最近記錄</h2>
                <div class="history" id="history-list"></div>
            </div>
        </div>

        <!-- 設定 Tab -->
        <div id="tab3" class="tab">
            <div class="card">
                <h2>設定</h2>
                <label>每日車費：</label>
                <input type="number" id="daily-car" value="70" style="width:100%;">
                
                <label>每日飯錢預算：</label>
                <input type="number" id="daily-meal-budget" value="250" style="width:100%;">
                
                <button onclick="saveSettings()" style="width:100%; margin-top:15px;">儲存設定</button>
                
                <button onclick="resetAll()" style="width:100%; margin-top:10px; background:#ef4444;">重置所有數據 (小心)</button>
            </div>
        </div>
    </div>

    <script>
        // 數據結構
        let settings = {
            dailyCar: 70,
            dailyMealBudget: 250
        };

        let monthlyBudgets = {
            "chii": 700,
            "pretty": 350,
            "larp_cot": 1600,
            "more_food": 1500,
            "idol": 2000,
            "uber": 600,
            "utilities": 500,
            "sfaa": 1680
        };

        let monthlySpent = {};
        let dailyRecords = {}; // YYYY-MM-DD: { meal: number, extra: number, total: number }

        // 初始化
        function init() {
            loadData();
            renderMonthlyTable();
            renderCategorySelect();
            switchTab(0);
            updateToday();
        }

        function loadData() {
            const savedSettings = localStorage.getItem('moneySettings');
            if (savedSettings) settings = JSON.parse(savedSettings);

            const savedBudgets = localStorage.getItem('monthlyBudgets');
            if (savedBudgets) monthlyBudgets = JSON.parse(savedBudgets);

            const savedSpent = localStorage.getItem('monthlySpent');
            if (savedSpent) monthlySpent = JSON.parse(savedSpent);

            const savedRecords = localStorage.getItem('dailyRecords');
            if (savedRecords) dailyRecords = JSON.parse(savedRecords);
        }

        function saveData() {
            localStorage.setItem('moneySettings', JSON.stringify(settings));
            localStorage.setItem('monthlyBudgets', JSON.stringify(monthlyBudgets));
            localStorage.setItem('monthlySpent', JSON.stringify(monthlySpent));
            localStorage.setItem('dailyRecords', JSON.stringify(dailyRecords));
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`tab${n}`).classList.add('active');
            document.querySelectorAll('.nav button')[n].classList.add('active');
            
            if (n === 1) renderMonthlyTable();
            if (n === 2) renderHistory();
        }

        function updateToday() {
            const today = new Date().toISOString().split('T')[0];
            const record = dailyRecords[today] || { meal: settings.dailyMealBudget, extra: 0 };
            
            const total = settings.dailyCar + record.meal + record.extra;
            const remain = (settings.dailyCar + settings.dailyMealBudget) - total;
            
            document.getElementById('today-meal').textContent = `-$${record.meal}`;
            document.getElementById('today-total').textContent = `$${total}`;
            document.getElementById('today-remain').textContent = `$${remain}`;
            document.getElementById('today-remain').className = remain >= 0 ? 'amount positive' : 'amount negative';
            
            document.getElementById('daily-savings').textContent = `$${Math.max(0, remain)}`;
        }

        function saveToday() {
            const today = new Date().toISOString().split('T')[0];
            const meal = parseFloat(document.getElementById('meal-input').value) || 0;
            const extra = parseFloat(document.getElementById('extra-input').value) || 0;
            
            dailyRecords[today] = { meal, extra };
            
            updateToday();
            saveData();
            renderHistory();
            
            alert('今日記錄已儲存！🎉');
        }

        function renderMonthlyTable() {
            const tbody = document.querySelector('#monthly-table tbody');
            tbody.innerHTML = '';
            
            let totalBudget = 0;
            let totalSpent = 0;
            
            Object.keys(monthlyBudgets).forEach(key => {
                const budget = monthlyBudgets[key];
                const spent = monthlySpent[key] || 0;
                const remain = budget - spent;
                
                totalBudget += budget;
                totalSpent += spent;
                
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${getCategoryName(key)}</td>
                    <td>$${budget}</td>
                    <td>$${spent}</td>
                    <td class="${remain >= 0 ? 'positive' : 'negative'}">$${remain}</td>
                `;
                tbody.appendChild(row);
            });
            
            document.getElementById('month-budget').textContent = `$${totalBudget}`;
            document.getElementById('month-spent').textContent = `$${totalSpent}`;
            document.getElementById('month-remain').textContent = `$${totalBudget - totalSpent}`;
            document.getElementById('month-remain').className = (totalBudget - totalSpent) >= 0 ? 'amount positive' : 'amount negative';
        }

        function getCategoryName(key) {
            const names = {
                chii: "Chii",
                pretty: "Pretty",
                larp_cot: "Larp / Cot",
                more_food: "額外食物",
                idol: "Idol",
                uber: "Uber",
                utilities: "水電",
                sfaa: "SFAA"
            };
            return names[key] || key;
        }

        function renderCategorySelect() {
            const select = document.getElementById('category-select');
            select.innerHTML = '';
            
            Object.keys(monthlyBudgets).forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = getCategoryName(key);
                select.appendChild(option);
            });
        }

        function addMonthlyExpense() {
            const category = document.getElementById('category-select').value;
            const amount = parseFloat(document.getElementById('monthly-amount').value);
            
            if (!amount || amount <= 0) {
                alert('請輸入有效金額');
                return;
            }
            
            if (!monthlySpent[category]) monthlySpent[category] = 0;
            monthlySpent[category] += amount;
            
            renderMonthlyTable();
            saveData();
            
            document.getElementById('monthly-amount').value = '';
            alert('月度開支已記錄');
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            
            const dates = Object.keys(dailyRecords).sort().reverse();
            
            dates.forEach(date => {
                const r = dailyRecords[date];
                const total = settings.dailyCar + r.meal + (r.extra || 0);
                const remain = (settings.dailyCar + settings.dailyMealBudget) - total;
                
                const div = document.createElement('div');
                div.style = 'padding:12px; background:#f8fafc; border-radius:8px; margin-bottom:8px;';
                div.innerHTML = `
                    <strong>${date}</strong><br>
                    車費: $${settings.dailyCar} | 飯: $${r.meal} | 其他: $${r.extra || 0}<br>
                    <span class="${remain >= 0 ? 'positive' : 'negative'}">剩餘: $${remain}</span>
                `;
                container.appendChild(div);
            });
            
            if (dates.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#64748b;">暫無歷史記錄</p>';
            }
        }

        function saveSettings() {
            settings.dailyCar = parseFloat(document.getElementById('daily-car').value) || 70;
            settings.dailyMealBudget = parseFloat(document.getElementById('daily-meal-budget').value) || 250;
            saveData();
            updateToday();
            alert('設定已更新');
        }

        function resetAll() {
            if (confirm('確定要清除所有數據？此操作無法復原！')) {
                localStorage.clear();
                location.reload();
            }
        }

        // 啟動
        window.onload = init;
    </script>
</body>
</html>
