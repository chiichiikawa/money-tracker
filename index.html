<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>錢錢記</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #9ECCE8 0%, #B4D4E8 100%);
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        .nav {
            display: flex;
            background: #f8fafc;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .nav button {
            flex: 1;
            padding: 16px 8px;
            background: none;
            border: none;
            font-size: 15px;
            cursor: pointer;
            color: #555;
        }
        .nav button.active {
            background: white;
            color: #1e88e5;
            border-bottom: 3px solid #1e88e5;
            font-weight: 600;
        }
        .tab {
            display: none;
            padding: 20px;
        }
        .tab.active {
            display: block;
        }
        .card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 16px;
        }
        button {
            background: #1e88e5;
            color: white;
            border: none;
            font-weight: bold;
            margin-top: 10px;
        }
        button:hover {
            background: #1565c0;
        }
        .amount {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
        }
        .positive { color: #2e7d32; }
        .negative { color: #c62828; }
        .review-box {
            text-align: center;
            padding: 25px;
            background: white;
            border-radius: 16px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="nav">
            <button onclick="switchTab(0)" class="active">今日入數</button>
            <button onclick="switchTab(1)">今月入數</button>
            <button onclick="switchTab(2)">今日review</button>
            <button onclick="switchTab(3)">今月review</button>
            <button onclick="switchTab(4)">設定</button>
        </div>

        <!-- 今日入數 -->
        <div id="tab0" class="tab active">
            <div class="card">
                <h2>今日開支</h2>
                <label>飯錢：</label>
                <input type="number" id="meal-input" value="250">
                
                <label>其他開支：</label>
                <input type="number" id="extra-input" placeholder="例如飲品、交通等">
                
                <button onclick="saveToday()">儲存今日記錄</button>
            </div>
        </div>

        <!-- 今月入數 -->
        <div id="tab1" class="tab">
            <div class="card">
                <h2>月度開支記錄</h2>
                <select id="category-select"></select>
                <input type="number" id="monthly-amount" placeholder="金額">
                <button onclick="addMonthlyExpense()">記錄月度開支</button>
            </div>
        </div>

        <!-- 今日review -->
        <div id="tab2" class="tab">
            <div class="review-box">
                <h2>今日慳到</h2>
                <div id="today-savings" class="amount positive">$0</div>
                <p>（車費$70 + 飯錢預算 - 實際用）</p>
            </div>
        </div>

        <!-- 今月review -->
        <div id="tab3" class="tab">
            <div class="review-box">
                <h2>今個月總慳到</h2>
                <div id="month-total-savings" class="amount positive">$0</div>
            </div>
            
            <div class="card">
                <h3>月度項目剩餘</h3>
                <div id="monthly-review-list"></div>
            </div>
        </div>

        <!-- 設定 -->
        <div id="tab4" class="tab">
            <div class="card">
                <h2>設定</h2>
                <label>每日車費</label>
                <input type="number" id="daily-car" value="70">
                
                <label>每日飯錢預算</label>
                <input type="number" id="daily-meal-budget" value="250">
                
                <button onclick="saveSettings()">儲存設定</button>
                <button onclick="resetAll()" style="background:#c62828;">重置所有數據</button>
            </div>
        </div>
    </div>

    <script>
        let settings = { dailyCar: 70, dailyMealBudget: 250 };
        let monthlyBudgets = { chii:700, pretty:350, larp_cot:1600, more_food:1500, idol:2000, uber:600, utilities:500, sfaa:1680 };
        let monthlySpent = {};
        let dailyRecords = {};

        function init() {
            loadData();
            renderCategorySelect();
            switchTab(0);
            updateReviews();
        }

        function loadData() {
            if (localStorage.getItem('moneySettings')) settings = JSON.parse(localStorage.getItem('moneySettings'));
            if (localStorage.getItem('monthlyBudgets')) monthlyBudgets = JSON.parse(localStorage.getItem('monthlyBudgets'));
            if (localStorage.getItem('monthlySpent')) monthlySpent = JSON.parse(localStorage.getItem('monthlySpent'));
            if (localStorage.getItem('dailyRecords')) dailyRecords = JSON.parse(localStorage.getItem('dailyRecords'));
        }

        function saveData() {
            localStorage.setItem('moneySettings', JSON.stringify(settings));
            localStorage.setItem('monthlyBudgets', JSON.stringify(monthlyBudgets));
            localStorage.setItem('monthlySpent', JSON.stringify(monthlySpent));
            localStorage.setItem('dailyRecords', JSON.stringify(dailyRecords));
        }

        function switchTab(n) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab${n}`).classList.add('active');
            document.querySelectorAll('.nav button')[n].classList.add('active');
            
            if (n === 2 || n === 3) updateReviews();
        }

        function saveToday() {
            const today = new Date().toISOString().split('T')[0];
            const meal = parseFloat(document.getElementById('meal-input').value) || 0;
            const extra = parseFloat(document.getElementById('extra-input').value) || 0;
            dailyRecords[today] = { meal, extra };
            saveData();
            updateReviews();
            alert('✅ 今日記錄已儲存');
        }

        function renderCategorySelect() {
            const select = document.getElementById('category-select');
            select.innerHTML = '';
            Object.keys(monthlyBudgets).forEach(k => {
                const opt = document.createElement('option');
                opt.value = k;
                opt.textContent = k === 'chii' ? 'Chii' : 
                                 k === 'pretty' ? 'Pretty' :
                                 k === 'larp_cot' ? 'Larp/Cot' :
                                 k === 'more_food' ? '額外食物' : k;
                select.appendChild(opt);
            });
        }

        function addMonthlyExpense() {
            const cat = document.getElementById('category-select').value;
            const amt = parseFloat(document.getElementById('monthly-amount').value);
            if (!amt) return alert('請輸入金額');
            if (!monthlySpent[cat]) monthlySpent[cat] = 0;
            monthlySpent[cat] += amt;
            saveData();
            updateReviews();
            document.getElementById('monthly-amount').value = '';
            alert('✅ 月度開支已記錄');
        }

        function updateReviews() {
            const today = new Date().toISOString().split('T')[0];
            const record = dailyRecords[today] || {meal: settings.dailyMealBudget, extra:0};
            const todayUsed = settings.dailyCar + record.meal + (record.extra||0);
            const todayBudget = settings.dailyCar + settings.dailyMealBudget;
            const todaySave = todayBudget - todayUsed;

            document.getElementById('today-savings').textContent = `$${todaySave}`;
            document.getElementById('today-savings').className = `amount ${todaySave >= 0 ? 'positive' : 'negative'}`;

            // 今月review
            let totalDailySave = 0;
            Object.values(dailyRecords).forEach(r => {
                const used = settings.dailyCar + r.meal + (r.extra||0);
                totalDailySave += (settings.dailyCar + settings.dailyMealBudget - used);
            });

            let totalMonthlyRemain = 0;
            Object.keys(monthlyBudgets).forEach(k => {
                const budget = monthlyBudgets[k];
                const spent = monthlySpent[k] || 0;
                totalMonthlyRemain += (budget - spent);
            });

            const grandTotalSave = totalDailySave + totalMonthlyRemain;
            document.getElementById('month-total-savings').textContent = `$${Math.round(grandTotalSave)}`;
            document.getElementById('month-total-savings').className = `amount ${grandTotalSave >= 0 ? 'positive' : 'negative'}`;

            // 月度項目
            let html = '';
            Object.keys(monthlyBudgets).forEach(k => {
                const remain = monthlyBudgets[k] - (monthlySpent[k]||0);
                html += `<div style="padding:10px 0;border-bottom:1px solid #eee;">
                    <strong>${k}</strong> 剩餘 <span class="${remain>=0?'positive':'negative'}">$${remain}</span>
                </div>`;
            });
            document.getElementById('monthly-review-list').innerHTML = html;
        }

        function saveSettings() {
            settings.dailyCar = parseFloat(document.getElementById('daily-car').value) || 70;
            settings.dailyMealBudget = parseFloat(document.getElementById('daily-meal-budget').value) || 250;
            saveData();
            updateReviews();
            alert('✅ 設定已儲存');
        }

        function resetAll() {
            if (confirm('確定清除所有數據？')) {
                localStorage.clear();
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
